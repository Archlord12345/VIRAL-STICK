name: Android Build CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: "Type de build"
        required: true
        default: "release"
        type: choice
        options:
          - debug
          - release

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  JAVA_VERSION: "17"
  # ── Environnement GitHub : "I_AM_ELON_MUSK" ──────────────────────
  # Secrets (environment-scoped) :
  #   GEMINI_API_KEY
  #   DEEPSEEK_API_KEY
  #   MISTRAL_API_KEY
  #
  # ── Secrets globaux du repository ─────────────────────────────────
  #   ANDROID_KEYSTORE          (base64 du fichier .keystore)
  #   ANDROID_KEYSTORE_PASSWORD
  #   ANDROID_KEY_ALIAS
  #   ANDROID_KEY_PASSWORD

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: ESLint
        run: npx eslint src/ --ext .js,.jsx --max-warnings 0
        continue-on-error: true

  build-android:
    name: Build Android APK + AAB
    runs-on: ubuntu-latest
    environment: I_AM_ELON_MUSK
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json
      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}
      - name: Install dependencies
        run: npm ci

      - name: Vérifier les clés API
        run: |
          if [ -n "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "✅ GEMINI_API_KEY configurée"
          else
            echo "⚠️ GEMINI_API_KEY manquante"
          fi
          if [ -n "${{ secrets.DEEPSEEK_API_KEY }}" ]; then
            echo "✅ DEEPSEEK_API_KEY configurée"
          fi
          if [ -n "${{ secrets.MISTRAL_API_KEY }}" ]; then
            echo "✅ MISTRAL_API_KEY configurée"
          fi

      - name: Check android/ exists
        id: check_android
        run: |
          if [ -d "android" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Cache Gradle
        if: steps.check_android.outputs.exists == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            mobile/android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('mobile/android/**/*.gradle*', 'mobile/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Decode Keystore
        if: steps.check_android.outputs.exists == 'true' && (github.event.inputs.build_type == 'release' || github.ref == 'refs/heads/main')
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/viral-stick.keystore
            echo "Keystore décodé"
          else
            echo "ANDROID_KEYSTORE non défini — build non signé"
          fi

      - name: Build APK
        if: steps.check_android.outputs.exists == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          if [ "${{ github.event.inputs.build_type }}" = "release" ] || [ "${{ github.ref }}" = "refs/heads/main" ]; then
            ./gradlew assembleRelease
          else
            ./gradlew assembleDebug
          fi

      - name: Build AAB
        if: steps.check_android.outputs.exists == 'true' && (github.event.inputs.build_type == 'release' || github.ref == 'refs/heads/main')
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew bundleRelease

      - name: Upload APK
        if: steps.check_android.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: viral-stick-apk-${{ github.event.inputs.build_type || 'debug' }}
          path: mobile/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn

      - name: Upload AAB
        if: steps.check_android.outputs.exists == 'true' && (github.event.inputs.build_type == 'release' || github.ref == 'refs/heads/main')
        uses: actions/upload-artifact@v4
        with:
          name: viral-stick-aab-release
          path: mobile/android/app/build/outputs/bundle/**/*.aab
          if-no-files-found: warn

      - name: Notify completion
        run: echo "✅ Build terminé — APK et AAB disponibles dans les artefacts"
