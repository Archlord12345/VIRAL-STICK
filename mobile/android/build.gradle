buildscript {
    ext {
        buildToolsVersion = "34.0.0" // Downgraded to a more stable version for compatibility
        minSdkVersion = 24
        compileSdkVersion = 34
        targetSdkVersion = 34
        ndkVersion = "26.1.10909125"
        kotlinVersion = "1.9.22" // Downgraded to match RN 0.74 requirements
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.3.1") // Pin Gradle plugin version
        classpath("com.facebook.react:react-native-gradle-plugin:0.74.0") // Pin RN plugin version
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
    }
}

apply plugin: "com.facebook.react.rootproject"
